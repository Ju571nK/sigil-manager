name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt into Node 24 for all JavaScript actions ahead of the 2026-06-02
# deadline that forces this default. Suppresses Node 20 deprecation
# warnings on actions/checkout, actions/setup-go, actions/setup-node,
# and golangci-lint-action.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  go:
    name: Go (test + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Go test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: Build web (required for embed.FS)
        working-directory: web
        run: |
          npm ci
          npm run build
          rm -rf ../internal/server/dist
          cp -r dist ../internal/server/dist

      - name: Go build
        run: go build -o sigil-manager ./cmd/sigil-manager

  web:
    name: Web (test + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test -- --run

      - run: npm run build

  e2e:
    name: E2E (Playwright vs. production binary)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      # Playwright keeps its browsers in ~/.cache/ms-playwright. Caching by
      # the package-lock hash means a single web/ dep bump invalidates it,
      # which matches when @playwright/test's browser pin can change.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: System deps for cached browser
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Build production binary (SPA + Go)
        run: make build

      - name: Playwright e2e
        working-directory: web
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
